api:
  dashboard: false

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: platform

# ForwardAuth middleware — all workspace subdomains validate JWT via backend
http:
  middlewares:
    platform-auth:
      forwardAuth:
        address: "http://backend:8000/auth/verify"
        authResponseHeaders:
          - "X-User-Id"
          - "X-User-Role"

log:
  level: INFO
