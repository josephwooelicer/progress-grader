[server]
HTTP_PORT = 3000
DOMAIN    = gitea.localhost
ROOT_URL  = http://gitea.localhost

[service]
DISABLE_REGISTRATION              = true
REQUIRE_SIGNIN_VIEW               = false
DEFAULT_KEEP_EMAIL_PRIVATE        = false
DEFAULT_ALLOW_CREATE_ORGANIZATION = true

[webhook]
ALLOWED_HOST_LIST = *
SKIP_TLS_VERIFY   = true

[database]
DB_TYPE = postgres

[log]
MODE  = console
LEVEL = Info
