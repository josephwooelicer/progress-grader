# Dev overrides: hot reload, exposed ports, relaxed settings
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ../services/backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"

  proxy:
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    volumes:
      - ../services/proxy:/app
    ports:
      - "8001:8001"

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"
